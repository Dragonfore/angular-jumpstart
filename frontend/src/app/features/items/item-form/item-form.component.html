<div class="item-form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEditMode() ? 'Edit Item' : 'New Item' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="item-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Title</mat-label>
          <input matInput formControlName="title" placeholder="Enter a title" />
          @if (form.get('title')?.hasError('required') && form.get('title')?.touched) {
            <mat-error>Title is required</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea
            matInput
            formControlName="description"
            placeholder="Enter a description (optional)"
            rows="4"
          ></textarea>
        </mat-form-field>

        <div class="form-actions">
          <button type="button" mat-stroked-button (click)="cancel()">
            <mat-icon>close</mat-icon>
            Cancel
          </button>
          <button type="submit" mat-raised-button color="primary" [disabled]="form.invalid || submitting()">
            <mat-icon>{{ isEditMode() ? 'save' : 'add' }}</mat-icon>
            {{ isEditMode() ? 'Save Changes' : 'Create Item' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
